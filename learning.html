<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --text-primary: #e8eaf6;
      --text-secondary: #8b8fa8;
      --text-url: #6c63ff;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #12141e 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 2px;
    }

    /* ── Search + stats bar ── */
    .toolbar {
      padding: 28px 48px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 420px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 11px 16px 11px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #search::placeholder { color: var(--text-secondary); }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .badge span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
      padding: 28px 48px 0;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform .2s, border-color .2s, box-shadow .2s, background .2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(0,0,0,.4), 0 0 0 1px var(--accent-glow);
      background: var(--surface-hover);
    }

    .card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .arrow {
      color: var(--text-secondary);
      transition: color .2s, transform .2s;
    }
    .card:hover .arrow { color: var(--accent); transform: translate(3px, -3px); }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
    }

    .card-subtopics {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .subtopic-tag {
      background: rgba(108, 99, 255, 0.15);
      border: 1px solid rgba(108, 99, 255, 0.3);
      color: #a78bfa;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .subtopic-count {
      background: rgba(156, 163, 175, 0.15);
      border: 1px solid rgba(156, 163, 175, 0.3);
      color: #9ca3af;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    #empty svg { margin-bottom: 16px; opacity: .4; }
    #empty p { font-size: 1rem; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header, .toolbar, #grid { padding-left: 20px; padding-right: 20px; }
      header { padding-top: 24px; padding-bottom: 24px; }
      #grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LEARNING DATA — add items here freely
     Each object: { title, description, subtopics[] }
════════════════════════════════════════════ -->

<header>
  <div style="display: flex; align-items: center; gap: 18px; flex: 1;">
    <div class="header-icon">📚</div>
    <div>
      <h1>Learning Dashboard</h1>
      <p>Track your AI learning roadmap including Python, LLMs, and system design</p>
    </div>
  </div>
  <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; gap: 6px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    Home
  </a>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Search learning topics…" />
  </div>
  <div class="badge">Total: <span id="total">0</span></div>
  <div class="badge">Showing: <span id="showing">0</span></div>
</div>

<div id="grid">
  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>No learning topics match your search.</p>
  </div>
</div>

<script>
  (() => {
    let data = [];
    const grid = document.getElementById('grid');
    const emptyEl = document.getElementById('empty');
    const searchEl = document.getElementById('search');
    const totalEl = document.getElementById('total');
    const showingEl = document.getElementById('showing');

    // Load data from external JSON file
    async function loadData() {
      try {
        const response = await fetch('data/learning.json');
        const jsonData = await response.json();
        data = jsonData.learning_topics || [];
        render();
      } catch (error) {
        console.error('Error loading learning data:', error);
        // Fallback data if file fails to load
        data = [];
        render();
      }
    }

    // Default icons fallback pool
    const fallbackIcons = ['📚','🎯','🔧','🚀','💡','🔍','⚙️','📊','🎨','🔬'];

    function getIcon(item, index) {
      return fallbackIcons[index % fallbackIcons.length];
    }

    function render(query = '') {
      const q = query.toLowerCase().trim();
      const filtered = q
        ? data.filter(n =>
            n.title.toLowerCase().includes(q) ||
            n.description.toLowerCase().includes(q) ||
            (n.subtopics || []).some(subtopic => subtopic.toLowerCase().includes(q))
          )
        : data;

      // Remove existing cards (keep empty placeholder)
      grid.querySelectorAll('.card').forEach(c => c.remove());

      totalEl.textContent = data.length;
      showingEl.textContent = filtered.length;
      emptyEl.style.display = filtered.length === 0 ? 'block' : 'none';

      filtered.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="card-top">
            <div class="card-icon">${getIcon(item, i)}</div>
            <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </div>
          <div class="card-title">${item.title}</div>
          <div class="card-desc">${item.description}</div>
          <div class="card-subtopics">
            ${(item.subtopics || []).map(subtopic => `<span class="subtopic-tag">${subtopic}</span>`).join('')}
          </div>
          <div class="card-meta">
            <span class="subtopic-count">${(item.subtopics || []).length} topics</span>
          </div>
        `;
        grid.insertBefore(div, emptyEl);
      });
    }

    searchEl.addEventListener('input', e => render(e.target.value));
    loadData();
  })();
</script>

</body>
</html>
