<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanjay Dhiman — Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f172a;
      --blue:   #1e40af;
      --accent: #3b82f6;
      --gold:   #f59e0b;
      --light:  #f8fafc;
      --muted:  #64748b;
      --border: #e2e8f0;
      --white:  #ffffff;
      --grad:   linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #1e40af 100%);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      color: var(--navy);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-logo { color: var(--white); font-weight: 700; font-size: 1rem; letter-spacing: 0.02em; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }

    /* ── HERO BANNER ── */
    .blog-hero {
      background: var(--grad);
      padding: 100px 2rem 48px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .blog-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .blog-hero .badge {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.4);
      color: var(--gold);
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.3rem 1rem; border-radius: 100px; margin-bottom: 1rem;
    }
    .blog-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--white); font-weight: 700; line-height: 1.15;
      margin-bottom: 0.65rem;
    }
    .blog-hero p {
      color: rgba(255,255,255,0.7); font-size: 1rem; max-width: 520px; margin: 0 auto;
    }

    /* ── LAYOUT ── */
    .blog-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      min-height: calc(100vh - 200px);
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 72px;
      align-self: start;
      padding-right: 1.5rem;
      max-height: calc(100vh - 90px);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-search {
      position: relative; margin-bottom: 1.25rem;
    }
    .sidebar-search input {
      width: 100%; padding: 0.55rem 0.9rem 0.55rem 2.2rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 0.82rem; color: var(--navy);
      background: var(--white); outline: none; transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search svg {
      position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--muted); pointer-events: none;
    }

    .category-block { margin-bottom: 0.5rem; }
    .category-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0.9rem; border-radius: 8px; border: none; cursor: pointer;
      background: var(--white); color: var(--navy);
      font-family: inherit; font-size: 0.88rem; font-weight: 600;
      text-align: left; transition: background 0.15s, color 0.15s;
      border: 1px solid var(--border);
    }
    .category-btn:hover { background: #eff6ff; color: var(--accent); border-color: #bfdbfe; }
    .category-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .category-btn .cat-icon { font-size: 1rem; margin-right: 0.5rem; }
    .category-btn .cat-label { flex: 1; }
    .category-btn .cat-count {
      font-size: 0.7rem; font-weight: 600; background: rgba(59,130,246,0.12);
      color: var(--accent); padding: 0.1rem 0.45rem; border-radius: 100px;
    }
    .category-btn.active .cat-count { background: rgba(255,255,255,0.15); color: var(--white); }
    .category-btn .chevron {
      width: 14px; height: 14px; transition: transform 0.2s; margin-left: 0.4rem;
      color: var(--muted); flex-shrink: 0;
    }
    .category-btn.open .chevron { transform: rotate(180deg); }

    .subtopic-list {
      display: none; flex-direction: column; gap: 0.15rem;
      padding: 0.4rem 0 0.4rem 0.8rem;
    }
    .subtopic-list.open { display: flex; }
    .subtopic-btn {
      padding: 0.45rem 0.75rem; border-radius: 6px; border: none; cursor: pointer;
      background: transparent; color: var(--muted); font-family: inherit;
      font-size: 0.82rem; font-weight: 500; text-align: left;
      transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .subtopic-btn::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background 0.15s;
    }
    .subtopic-btn:hover { background: #eff6ff; color: var(--accent); }
    .subtopic-btn:hover::before { background: var(--accent); }
    .subtopic-btn.active { background: #dbeafe; color: var(--blue); font-weight: 600; }
    .subtopic-btn.active::before { background: var(--accent); }

    /* ── CONTENT PANEL ── */
    .content-panel {
      border-left: 1px solid var(--border);
      padding-left: 2rem;
      min-height: 600px;
    }

    .content-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 400px; text-align: center; color: var(--muted);
    }
    .content-placeholder svg { width: 56px; height: 56px; margin-bottom: 1rem; opacity: 0.3; }
    .content-placeholder p { font-size: 0.95rem; }

    .topic-content { display: none; }
    .topic-content.active { display: block; }

    .topic-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.75rem; padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .topic-breadcrumb {
      font-size: 0.75rem; color: var(--muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .topic-breadcrumb span { color: var(--accent); }
    .topic-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; color: var(--navy);
    }
    .topic-badge {
      display: inline-block; white-space: nowrap;
      background: rgba(59,130,246,0.08); color: var(--accent);
      border: 1px solid rgba(59,130,246,0.2);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 100px; margin-top: 0.25rem;
    }

    .topic-body h3 {
      font-size: 1.05rem; font-weight: 700; color: var(--navy);
      margin: 1.5rem 0 0.6rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .topic-body h3::before {
      content: ''; display: inline-block; width: 4px; height: 1em;
      background: var(--accent); border-radius: 2px; flex-shrink: 0;
    }
    .topic-body p { font-size: 0.9rem; color: #475569; margin-bottom: 0.75rem; }
    .topic-body ul { margin: 0.5rem 0 0.75rem 1.2rem; }
    .topic-body ul li { font-size: 0.88rem; color: #475569; margin-bottom: 0.35rem; }

    .code-block {
      background: var(--navy); color: #e2e8f0;
      border-radius: 10px; padding: 1.25rem 1.5rem;
      font-family: 'Courier New', Courier, monospace; font-size: 0.82rem;
      line-height: 1.7; overflow-x: auto; margin: 1rem 0 1.25rem;
      position: relative;
    }
    .code-block .lang-tag {
      position: absolute; top: 0.6rem; right: 0.8rem;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--gold); opacity: 0.8;
    }
    .code-block .kw  { color: #93c5fd; }
    .code-block .cl  { color: #fde68a; }
    .code-block .cm  { color: #6b7280; font-style: italic; }
    .code-block .st  { color: #86efac; }
    .code-block .an  { color: #fb923c; }

    .tip-box {
      display: flex; gap: 0.75rem; align-items: flex-start;
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px;
      padding: 1rem 1.1rem; margin: 1rem 0;
    }
    .tip-box svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
    .tip-box p { font-size: 0.85rem; color: var(--blue); margin: 0; }

    .warn-box {
      display: flex; gap: 0.75rem; align-items: flex-start;
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
      padding: 1rem 1.1rem; margin: 1rem 0;
    }
    .warn-box svg { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; margin-top: 2px; }
    .warn-box p { font-size: 0.85rem; color: #92400e; margin: 0; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1.25rem 0 0; }
    .tag {
      background: #f1f5f9; color: var(--muted); border: 1px solid var(--border);
      font-size: 0.72rem; font-weight: 600; padding: 0.25rem 0.65rem;
      border-radius: 100px; letter-spacing: 0.04em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .blog-layout { grid-template-columns: 1fr; padding: 0 1rem; }
      .sidebar { position: static; max-height: none; padding-right: 0; margin-bottom: 1.5rem; }
      .content-panel { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 1.5rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">SD<span>.</span></div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="./index.html" class="active">Blog</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <div class="blog-hero">
    <div class="badge">Knowledge Base</div>
    <h1>Tech Blog</h1>
    <p>Deep-dives into Java, System Design, DevOps, and more — from 15+ years of engineering experience.</p>
  </div>

  <!-- BLOG LAYOUT -->
  <div class="blog-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search topics…" oninput="filterTopics(this.value)" />
      </div>

      <div id="sidebar-menu">

        <!-- Kubernetes -->
        <div class="category-block" data-category="kubernetes">
          <button class="category-btn" onclick="toggleCategory(this, 'kubernetes')">
            <span class="cat-icon">⎈</span>
            <span class="cat-label">Kubernetes</span>
            <span class="cat-count">1</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="subtopic-list" id="sub-kubernetes">
            <button class="subtopic-btn" onclick="window.location.href='ingress.html'">Ingress ↗</button>
          </div>
        </div>

      </div><!-- /sidebar-menu -->
    </aside>

    <!-- CONTENT PANEL -->
    <main class="content-panel">

      <!-- Default placeholder -->
      <div class="content-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p>Select a topic from the left to start reading</p>
      </div>


    </main>
  </div>

  <script>
    let activeTopic = null;
    let activeCategory = null;
    let activeCatBtn = null;

    function toggleCategory(btn, cat) {
      const subList = document.getElementById('sub-' + cat);
      const isOpen = subList.classList.contains('open');

      // Close all
      document.querySelectorAll('.subtopic-list').forEach(l => l.classList.remove('open'));
      document.querySelectorAll('.category-btn').forEach(b => { b.classList.remove('open'); b.classList.remove('active'); });

      if (!isOpen) {
        subList.classList.add('open');
        btn.classList.add('open');
        btn.classList.add('active');
        activeCategory = cat;
        activeCatBtn = btn;
      } else {
        activeCategory = null;
        activeCatBtn = null;
      }
    }

    function showTopic(id) {
      // Hide all topics & placeholder
      document.querySelectorAll('.topic-content').forEach(t => t.classList.remove('active'));
      document.getElementById('placeholder').style.display = 'none';

      // Show selected
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
      activeTopic = id;

      // Highlight subtopic button
      document.querySelectorAll('.subtopic-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.subtopic-btn').forEach(b => {
        if (b.getAttribute('onclick') === "showTopic('" + id + "')") b.classList.add('active');
      });

      // Scroll content to top on mobile
      if (window.innerWidth <= 768) {
        document.querySelector('.content-panel').scrollIntoView({ behavior: 'smooth' });
      }
    }

    function filterTopics(query) {
      const q = query.toLowerCase().trim();
      document.querySelectorAll('.category-block').forEach(block => {
        const catName = block.querySelector('.cat-label').textContent.toLowerCase();
        const subtopicBtns = block.querySelectorAll('.subtopic-btn');
        let anyMatch = false;

        subtopicBtns.forEach(btn => {
          const text = btn.textContent.toLowerCase();
          const match = !q || text.includes(q) || catName.includes(q);
          btn.style.display = match ? '' : 'none';
          if (match) anyMatch = true;
        });

        block.style.display = anyMatch ? '' : 'none';
        if (q && anyMatch) {
          block.querySelector('.subtopic-list').classList.add('open');
          block.querySelector('.category-btn').classList.add('open', 'active');
        }
      });
    }
  </script>
</body>
</html>
