<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Sanjay Dhiman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #1a2035; --border: #1e293b;
      --primary: #6366f1; --primary-light: #818cf8; --secondary: #06b6d4;
      --accent: #f59e0b; --green: #10b981; --rose: #f43f5e;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 64px;
      background: rgba(10,14,26,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(99,102,241,0.15);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px;
    }
    .nav-logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      color: var(--muted); text-decoration: none; font-size: 0.84rem; font-weight: 500;
      padding: 6px 14px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border); background: rgba(99,102,241,0.08); }
    .nav-link.active { color: var(--primary-light); border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.1); }
    .page-hero { padding: 120px 0 60px; text-align: center; position: relative; overflow: hidden; }
    .page-hero::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .page-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3);
      border-radius: 50px; padding: 5px 14px; font-size: 0.76rem;
      color: var(--primary-light); font-weight: 600; margin-bottom: 20px;
    }
    .page-hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; margin-bottom: 14px; }
    .page-hero p { font-size: 1rem; color: var(--muted); max-width: 560px; margin: 0 auto; line-height: 1.8; }
    .controls { display: flex; align-items: center; gap: 14px; margin: 40px 0 36px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input {
      width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 16px 11px 42px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.88rem; outline: none; transition: all .2s;
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; color: var(--muted); pointer-events: none; }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; border-radius: 50px; font-size: 0.78rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--primary); }
    .filter-btn.active { color: var(--primary-light); border-color: var(--primary); background: rgba(99,102,241,.1); }
    .results-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; }
    .results-meta span { color: var(--primary-light); font-weight: 600; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 60px; }
    .post-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 26px; transition: all 0.3s; display: flex; flex-direction: column; text-decoration: none;
    }
    .post-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 36px rgba(99,102,241,0.12); }
    .post-cat {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 50px; border: 1px solid;
      margin-bottom: 14px; align-self: flex-start;
    }
    .post-title { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
    .post-excerpt { font-size: 0.82rem; color: var(--muted); line-height: 1.7; flex: 1; margin-bottom: 18px; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; }
    .post-date { font-size: 0.72rem; color: var(--muted); }
    .post-read { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .no-results { display: none; text-align: center; padding: 80px 0; color: var(--muted); }
    .no-results.show { display: block; }
    .no-results-icon { font-size: 3rem; margin-bottom: 16px; }
    .loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: 0.9rem; }
    footer { border-top: 1px solid var(--border); padding: 28px 0; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; transition: color .2s; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { color: var(--muted); font-size: 0.76rem; }
    .fade-up { opacity: 0; transform: translateY(22px); transition: opacity .55s ease, transform .55s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    @media (max-width: 700px) { .posts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">SD</a>
    <div class="nav-right">
      <a href="../index.html" class="nav-link">← Home</a>
      <a href="index.html" class="nav-link active">Blog</a>
      <a href="../contributions/index.html" class="nav-link">Contributions</a>
      <a href="../articles/index.html" class="nav-link">Articles</a>
    </div>
  </div>
</nav>
<div class="page-hero">
  <div class="container">
    <div class="page-badge">✍️ Personal Writing</div>
    <h1>My <span class="gradient-text">Blog</span></h1>
    <p id="heroSubtitle">Personal stories, opinions, and reflections — unfiltered thoughts from my world.</p>
  </div>
</div>
<div class="container">
  <div class="controls fade-up">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search posts…" oninput="filterPosts()" />
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">All</button>
    </div>
  </div>
  <div class="results-meta fade-up">Showing <span id="countSpan">0</span> posts</div>
  <div class="posts-grid" id="postsGrid">
    <div class="loading">Loading posts…</div>
  </div>
  <div class="no-results" id="noResults">
    <div class="no-results-icon">🔎</div>
    <p>No posts found matching your search.</p>
  </div>
</div>
<footer>
  <div class="container">
    <div class="footer-inner">
      <div style="font-size:1rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Sanjay Dhiman</div>
      <div class="footer-links">
        <a href="../index.html">Home</a>
        <a href="../articles/index.html">Articles</a>
        <a href="../contributions/index.html">Contributions</a>
        <a href="../index.html#contact">Contact</a>
      </div>
      <div class="footer-copy">© 2026 Sanjay Dhiman</div>
    </div>
  </div>
</footer>
<script>
  /* ── Category colour palette (auto-assigned by index) ─────────────────── */
  const PALETTE = [
    { color: 'var(--primary-light)', border: 'rgba(99,102,241,.3)',  bg: 'rgba(99,102,241,.08)'  },
    { color: 'var(--secondary)',     border: 'rgba(6,182,212,.3)',   bg: 'rgba(6,182,212,.08)'   },
    { color: 'var(--accent)',        border: 'rgba(245,158,11,.3)',  bg: 'rgba(245,158,11,.08)'  },
    { color: 'var(--green)',         border: 'rgba(16,185,129,.3)',  bg: 'rgba(16,185,129,.08)'  },
    { color: 'var(--rose)',          border: 'rgba(244,63,94,.3)',   bg: 'rgba(244,63,94,.08)'   },
    { color: '#a78bfa',              border: 'rgba(167,139,250,.3)', bg: 'rgba(167,139,250,.08)' },
  ];
  const catColour = {};
  let paletteIdx = 0;
  function colourFor(cat) {
    const key = cat.toLowerCase();
    if (!catColour[key]) { catColour[key] = PALETTE[paletteIdx++ % PALETTE.length]; }
    return catColour[key];
  }

  /* ── State ────────────────────────────────────────────────────────────── */
  let allPosts = [];
  let activeFilter = 'all';

  /* ── Boot: load from JSON (no hardcoded fallback) ─────────────────────── */
  fetch('blogs.json')
    .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
    .then(data => init(data))
    .catch(() => {
      document.getElementById('postsGrid').innerHTML =
        '<p style="color:var(--muted);text-align:center;padding:40px 0;">Could not load posts. Make sure blogs.json is present.</p>';
    });

  function init(data) {
    allPosts = data;
    /* Derive page subtitle from JSON meta if present */
    if (data._meta && data._meta.subtitle)
      document.getElementById('heroSubtitle').textContent = data._meta.subtitle;
    /* Support both top-level array and { posts:[], _meta:{} } shape */
    const posts = Array.isArray(data) ? data : (data.posts || []);
    allPosts = posts;
    buildFilterTabs(posts);
    renderGrid(posts);
  }

  /* ── Filter tabs ──────────────────────────────────────────────────────── */
  function buildFilterTabs(posts) {
    const cats = [...new Set(posts.map(p => p.category).filter(Boolean))];
    const tabs = document.getElementById('filterTabs');
    cats.forEach(cat => {
      const c = colourFor(cat);
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.style.cssText = `color:${c.color};border-color:${c.border}`;
      btn.onclick = () => setFilter(cat, btn);
      tabs.appendChild(btn);
    });
  }

  /* ── Render ───────────────────────────────────────────────────────────── */
  function renderGrid(posts) {
    const grid = document.getElementById('postsGrid');
    if (!posts.length) { grid.innerHTML = ''; showNoResults(true); return; }
    showNoResults(false);
    grid.innerHTML = posts.map(p => cardHTML(p)).join('');
    document.getElementById('countSpan').textContent = posts.length;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
    grid.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  }

  function cardHTML(p) {
    const c    = colourFor(p.category || 'post');
    const date = p.date ? new Date(p.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const file = p.file || '#';
    return `
      <a class="post-card fade-up" href="${file}"
         data-cat="${(p.category||'').toLowerCase()}"
         data-search="${(p.title+' '+(p.subtitle||'')+' '+(p.category||'')).toLowerCase()}">
        <span class="post-cat" style="color:${c.color};border-color:${c.border};background:${c.bg}">${p.category || 'Post'}</span>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.subtitle || ''}</div>
        <div class="post-footer">
          <span class="post-date">${date}</span>
          ${p.readTime ? `<span class="post-read">⏱ ${p.readTime} min read</span>` : ''}
        </div>
      </a>`;
  }

  /* ── Search + filter ──────────────────────────────────────────────────── */
  function setFilter(cat, btn) {
    activeFilter = cat.toLowerCase();
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active');
      b.style.background = '';
    });
    btn.classList.add('active');
    const c = cat === 'all' ? null : colourFor(cat);
    if (c) btn.style.background = c.bg;
    filterPosts();
  }

  function filterPosts() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = allPosts.filter(p => {
      const catMatch    = activeFilter === 'all' || (p.category||'').toLowerCase() === activeFilter;
      const searchMatch = !q || (p.title+' '+(p.subtitle||'')+' '+(p.category||'')).toLowerCase().includes(q);
      return catMatch && searchMatch;
    });
    renderGrid(filtered);
  }

  function showNoResults(show) {
    document.getElementById('noResults').classList.toggle('show', show);
    if (show) document.getElementById('countSpan').textContent = '0';
  }

  /* ── Scroll reveal for static elements ───────────────────────────────── */
  const revObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.fade-up').forEach(el => revObs.observe(el));
</script>
</body>
</html>
